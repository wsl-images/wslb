name: Create Release

on:
  push:
    tags:
      - '*'

jobs:
  build_and_release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: get_version
        run: |
          $version = "${{ github.ref_name }}".Replace('v', '')
          echo "VERSION=$version" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build all components
        run: |
          .\build.ps1 -Version "${{ env.VERSION }}"
        shell: pwsh

      - name: Calculate wslb.exe hash
        run: |
          $exePath = "bin\wslb.exe"
          if (Test-Path $exePath) {
            $hash = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash
            $hash | Out-File "bin\wslb-exe-hash.txt"
            echo "Calculated wslb.exe SHA256: $hash"
          } else {
            echo "Error: wslb.exe not found!"
            exit 1
          }
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: WSLB ${{ env.VERSION }}
          draft: false
          prerelease: false
          files: |
            bin/wslb.exe
            bin/wslb
            bin/wslb-exe-hash.txt
          generate_release_notes: true

      - name: Output Hash for WinGet
        run: |
          $exeHash = Get-Content bin\wslb-exe-hash.txt
          echo "wslb.exe SHA256: $exeHash"
          echo "Use this hash in your WinGet manifest"
        shell: pwsh